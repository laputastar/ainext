<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/">
<title>AI 工具分类 — AINext</title>
<meta name="description" content="浏览 AINext 精选的 AI 工具分类，发现写作、编程、图像、视频等各类 AI 产品。">
<meta property="og:title" content="AI 工具分类 — AINext">
<meta property="og:description" content="浏览 AINext 精选的 AI 工具分类。">
<meta property="og:image" content="https://www.ainext.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AI 工具分类 — AINext">
<meta name="twitter:description" content="浏览 AINext 精选的 AI 工具分类。">
<meta name="twitter:image" content="https://www.ainext.com/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="ainext-icon.svg">
<link rel="apple-touch-icon" href="ainext-icon.svg">
<link rel="stylesheet" href="common.css">
<script src="ga.js"></script>
<script src="components.js"></script>
<style>
.breadcrumb{padding:16px 20px;font-size:13px;color:var(--gray-500);display:flex;align-items:center;gap:6px;max-width:1200px;margin:0 auto}
.breadcrumb a{color:var(--gray-500);text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:var(--color-primary)}
.breadcrumb span{color:var(--gray-900);font-weight:500}
.cat-header{text-align:center;padding:0 20px 24px;max-width:800px;margin:0 auto}
.cat-header h1{font-size:28px;font-weight:800;color:var(--gray-900);margin:0 0 8px}
.cat-header p{font-size:15px;color:var(--gray-500);margin:0}
.cat-header .cat-count{display:inline-block;margin-top:12px;background:var(--gray-100);color:var(--gray-600);padding:4px 14px;border-radius:20px;font-size:13px}
.cat-tabs{display:flex;gap:4px;background:var(--gray-100);padding:4px;border-radius:12px;max-width:1200px;margin:0 auto 16px;width:fit-content}
.cat-tab{padding:8px 20px;border-radius:10px;font-size:14px;font-weight:500;color:var(--gray-500);transition:all .15s;white-space:nowrap;background:none;border:none;cursor:pointer;font-family:inherit}
.cat-tab:hover{color:var(--gray-700)}
.cat-tab.active{background:#fff;color:var(--gray-900);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1200px;margin:0 auto;padding:0 20px 24px}
/* Card styles → common.css */
.cat-back{text-align:center;padding:0 20px 48px}
.cat-back a{color:var(--color-primary);text-decoration:none;font-size:14px;font-weight:500}
@media(max-width:768px){.tool-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.tool-grid{grid-template-columns:1fr}.cat-tabs{width:calc(100% - 40px)}.cat-tab{flex:1;text-align:center}}
</style>
</head>
<body>
<script>document.write(headerHTML('',''))</script>
<div class="breadcrumb" id="breadcrumb"><a href="index.html">首页</a><span>/</span><span>加载中...</span></div>
<div class="cat-header" id="catHeader"><h1>加载中...</h1><p></p><div class="cat-count">加载中...</div></div>
<div class="cat-tabs" id="catTabs">
  <button class="cat-tab active" data-sort="hot">🔥 热度</button>
  <button class="cat-tab" data-sort="latest">🕐 最新</button>
</div>
<div class="tool-grid" id="toolGrid"></div>
<div class="cat-back"><a href="index.html">← 回到首页浏览全部工具</a></div>
<script>document.write(footerHTML())</script>
<script src="ad.js"></script>

<script>
(function(){
// Extract category slug from URL path: /category/writing.html → writing
var path = window.location.pathname;
var slug = path.replace(/^\/category\//,'').replace(/\.html$/,'');

Promise.all([
  fetch('/tools-slim.json').then(function(r){return r.json()}),
  fetch('/categories.json').then(function(r){return r.json()})
]).then(function(results){
  var tools = results[0];
  var cats = results[1].categories || results[1];
  var cat = cats.find(function(c){return c.id === slug});
  if (!cat) {
    document.getElementById('catHeader').innerHTML = '<h1>分类未找到</h1>';
    return;
  }

  // Update title and meta
  document.title = 'AI ' + cat.name + ' — AINext';
  document.querySelector('.breadcrumb span:last-child').textContent = cat.name;
  document.getElementById('catHeader').innerHTML = '<h1>AI ' + cat.name + '</h1><p>' + cat.description + '</p><div class="cat-count">加载中...</div>';

  // Filter and sort
  var ctools = tools.filter(function(t){return t.category === slug});
  ctools.sort(function(a,b){return b.votesCount - a.votesCount});

  var CAT_COUNT = ctools.length;
  var PAGE_SIZE = 24;
  var currentPage = 0;
  var filteredList = ctools.slice();
  var nextAdAt = 8 + Math.floor(Math.random() * 3);
  var searchQuery = '';
  var sortMode = 'hot';

  // AMC config for shared appendMore
  window.AMC = {
    gridId: 'toolGrid', pageSize: 24, adInterval: 8, adRandom: 3,
    isSearching: function() { return searchQuery; },
    doSort: function(a, b) { return sortMode === 'latest' ? new Date(b.createdAt) - new Date(a.createdAt) : b.votesCount - a.votesCount; }
  };
  window.filteredList = filteredList;
  window.currentPage = currentPage;
  window.nextAdAt = nextAdAt;

  function updateCount(){
    document.querySelector('.cat-count').textContent = '共 ' + (searchQuery ? filteredList.length + ' / ' + CAT_COUNT : CAT_COUNT) + ' 款工具';
  }

  // appendMore → components.js
  // Sync globals after each call
  var origAppendMore = appendMore;
  appendMore = function() {
    window.filteredList = filteredList;
    window.currentPage = currentPage;
    window.nextAdAt = nextAdAt;
    origAppendMore();
    currentPage = window.currentPage;
    nextAdAt = window.nextAdAt;
  };

  document.querySelectorAll('.cat-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.remove('active')});
      this.classList.add('active');
      sortMode = this.dataset.sort;
      currentPage = 0;
      filteredList = searchQuery ? ctools.filter(function(t){return t.name.toLowerCase().indexOf(searchQuery)>=0}) : ctools.slice();
      appendMore();
    });
  });

  updateCount();
  appendMore();
  window.appendMore = appendMore;

  // No header search in fallback template — SSR handles that
}).catch(function(e){
  document.getElementById('catHeader').innerHTML = '<h1>加载失败</h1><p>请稍后重试</p>';
  console.error(e);
});
})();
</script>
</body>
</html>
