<style>
:root {
  --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-12: 48px; --space-16: 64px;
  --section-lg: 96px; --container-max: 1280px;
}
/* ── Search ── */
.header-right{display:flex;align-items:center;gap:12px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--gray-400);pointer-events:none}
.search-input{width:280px;padding:9px 16px 9px 38px;background:var(--gray-100);border:1.5px solid transparent;border-radius:10px;font-size:14px;color:var(--gray-900);outline:none;transition:all .15s}
.search-input::placeholder{color:var(--gray-400)}
.search-input:focus{background:#fff;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(180,83,9,.1)}

/* ── Hero ── */
.hero{padding:48px 0 36px;text-align:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(180,83,9,.04) 0%,transparent 70%)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--color-primary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:44px;font-weight:800;line-height:1.1;letter-spacing:-0.02em;color:var(--gray-900);max-width:700px;margin:0 auto 12px}
.hero h1 span{background:linear-gradient(135deg,var(--color-primary),#D97706,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:17px;color:var(--gray-500);max-width:700px;margin:0 auto 20px;line-height:1.5;white-space:nowrap}
.hero-stats{display:flex;gap:28px;justify-content:center;margin-top:0;padding-top:0;border-top:none}
.hero-stat{text-align:center}.hero-stat-num{font-size:28px;font-weight:800;color:var(--gray-900)}.hero-stat-label{font-size:13px;color:var(--gray-500);margin-top:4px}

/* ── Category Strip (compact pills) ── */
.cat-strip{padding:0 0 24px}
.cat-strip-inner{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap}
.cat-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;background:var(--gray-100);font-size:14px;font-weight:500;color:var(--gray-700);transition:all .15s;cursor:pointer;white-space:nowrap}
.cat-pill:hover{background:var(--color-primary-light);color:var(--color-primary)}
.cat-pill.active{background:var(--color-primary);color:#fff}
.cat-pill-icon{font-size:15px;line-height:1}

/* ── Featured Section ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-head h2{font-size:18px;font-weight:700;color:var(--gray-900)}
.feat-section{padding:0 0 32px}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.feat-card{background:#fff;border:1.5px solid var(--color-border);border-radius:14px;padding:18px;box-shadow:var(--shadow-xs);transition:all .2s;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.feat-card:hover{border-color:var(--gray-300);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--color-primary),#D97706)}
.feat-rank{font-size:22px;font-weight:800;color:var(--color-accent)}
.feat-header{display:flex;align-items:center;gap:10px}
.feat-img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--gray-100);flex-shrink:0}
.feat-info{flex:1;min-width:0}
.feat-name{font-size:15px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-tagline{font-size:12px;color:var(--gray-500);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.feat-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.feat-stats{display:flex;gap:10px;font-size:12px;color:var(--gray-400)}
.feat-visit{font-size:12px;font-weight:600;color:var(--color-primary);transition:color .15s}
.feat-visit:hover{color:var(--color-primary-hover)}

/* ── Ad ── */
.ad-slot{display:flex;align-items:center;justify-content:center;border:2px dashed var(--gray-300);border-radius:10px;background:var(--gray-100);color:var(--gray-400);font-size:13px;font-weight:500;margin:0 auto;min-height:90px;width:100%}
.ad-slot-responsive{max-width:728px}
/* Native ad card — blends into tool grid */
.tool-card-ad{background:linear-gradient(135deg,#FFF7ED,#fff);border:1px dashed #D4A373;border-radius:14px;padding:var(--space-5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;cursor:pointer;transition:all .2s;min-height:180px}
.tool-card-ad:hover{border-color:var(--color-primary);box-shadow:0 2px 12px rgba(180,83,9,.1)}
.ad-label{font-size:11px;font-weight:500;color:var(--gray-400);letter-spacing:.04em;text-transform:uppercase}

/* ── Toolbar ── */
.toolbar{padding:var(--space-6) 0 var(--space-8)}
.toolbar-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-4)}
.tabs{display:flex;gap:4px;background:var(--gray-100);padding:4px;border-radius:12px}
.tab{padding:8px 20px;border-radius:10px;font-size:14px;font-weight:500;color:var(--gray-500);transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--gray-700)}
.tab.active{color:var(--color-primary);background:#fff;font-weight:600;box-shadow:var(--shadow-xs)}
.tool-count{font-size:14px;color:var(--gray-500);font-weight:500}

.cat-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;background:var(--color-primary-light);color:var(--color-primary);font-size:13px;font-weight:600}
.cat-tag span{cursor:pointer;font-size:15px;line-height:1}
.cat-tag span:hover{color:var(--color-primary-dark)}

/* ── Card Grid ── */
.tool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-5)}
.tool-card{background:#fff;border:1px solid var(--color-border);border-radius:14px;padding:var(--space-5);box-shadow:var(--shadow-xs);transition:all .2s;display:flex;flex-direction:column;gap:14px}
.tool-card:hover{border-color:var(--gray-300);box-shadow:var(--shadow-sm);transform:translateY(-2px)}
.tool-card-header{display:flex;align-items:flex-start;gap:12px}
.tool-thumb{width:48px;height:48px;border-radius:12px;object-fit:cover;background:var(--gray-100);flex-shrink:0}
.tool-info{flex:1;min-width:0}
.tool-name{font-size:16px;font-weight:600;color:var(--gray-900);line-height:1.3}
.tool-tagline{font-size:13px;color:var(--gray-500);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:4px}
.tool-topics{display:flex;gap:6px;flex-wrap:wrap}
.topic-tag{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600;line-height:1.5;background:var(--gray-100);color:var(--gray-500)}
.tool-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.tool-stats{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--gray-400);font-weight:500}
.tool-stats span{display:flex;align-items:center;gap:3px}

.btn-visit{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:8px;background:var(--color-primary-light);color:var(--color-primary);font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn-visit:hover{background:var(--color-primary);color:#fff}
.load-more{display:block;width:100%;padding:14px;margin-top:var(--space-6);margin-bottom:var(--space-8);border:1.5px dashed var(--color-border);border-radius:12px;background:0;color:var(--gray-500);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.load-more:hover{background:var(--gray-100);border-color:var(--gray-300);color:var(--gray-700)}
.load-more:active{transform:scale(.99)}

.empty-state{grid-column:1/-1;text-align:center;padding:80px var(--space-5)}
.empty-state-icon{font-size:48px;margin-bottom:var(--space-4)}
.empty-state h3{font-size:18px;font-weight:600;color:var(--gray-900);margin-bottom:8px}
.empty-state p{font-size:14px;color:var(--gray-500)}

/* ── Responsive ── */
@media(max-width:1024px){.tool-grid{grid-template-columns:repeat(3,1fr)}.feat-grid{grid-template-columns:repeat(3,1fr)}.search-input{width:200px}.hero h1{font-size:40px}}
@media(max-width:768px){.tool-grid{grid-template-columns:repeat(2,1fr)}.feat-grid{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:34px}.hero p{white-space:normal}.hero{padding:40px 0 32px}.hero-stats{gap:20px}.hero-stat-num{font-size:22px}.search-input{width:160px}}
@media(max-width:640px){.tool-grid{grid-template-columns:1fr}.feat-grid{grid-template-columns:1fr}.hero h1{font-size:26px}.hero p{font-size:15px;white-space:normal}.hero{padding:32px 0 24px}.hero-stats{flex-wrap:wrap;gap:16px}.hero-stat-num{font-size:20px}.search-input{width:140px}.tabs{width:100%;justify-content:center}.tab{padding:8px 14px;font-size:13px}.toolbar-inner{flex-direction:column;align-items:stretch}.tool-count{text-align:center}.tool-card{padding:16px;gap:10px}.cat-pill{padding:5px 12px;font-size:13px}}
</style>
<script src="components.js"></script>
<script src="ga.js"></script>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" class="logo"><svg width="115" height="27" viewBox="0 0 230 54"><circle cx="26" cy="27" r="25" fill="#D45D4C"/><text x="26" y="37" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="30" fill="#fff">AI</text><text x="54" y="37" font-family="system-ui,sans-serif" font-weight="600" font-size="30" fill="#3B2E2A">Next</text></svg></a>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索 AI 工具..." autocomplete="off" aria-label="搜索 AI 工具">
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>发现<span>下一代 AI 工具</span></h1>
    <p>AINext 精选全球最优秀的 AI 产品，帮你找到提升效率、激发创意的人工智能工具。</p>
    <div class="hero-stats" id="heroStats">
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">本月新增</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">收录工具</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">分类</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">最近更新</div></div>
    </div>
  </div>
</section>

<!-- Categories (compact pills) -->
<div class="cat-strip">
  <div class="container">
    <div class="cat-strip-inner">
      <div class="cat-pills" id="catPills"></div>
    </div>
  </div>
</div>

<!-- Featured -->
<section class="feat-section">
  <div class="container">
    <div class="section-head"><h2>⭐ 本周精选</h2></div>
    <div class="feat-grid" id="featGrid"></div>
  </div>
</section>

<!-- Ad 1 -->
<div class="container" style="padding-bottom:48px"><div class="ad-slot ad-slot-responsive">广告位招租 (响应式)</div></div>

<!-- Toolbar -->
<div class="container toolbar">
  <div class="toolbar-inner">
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="latest">✨ 最新上线</button>
      <button class="tab" data-tab="weekly">🔥 上周热门</button>
      <button class="tab" data-tab="monthly">🏆 本月热门</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="cat-tag" id="catTag" style="display:none"><span id="catTagName"></span><span onclick="clearCat()">×</span></span>
      <span class="tool-count" id="toolCount">共 — 个工具</span>
    </div>
  </div>
</div>

<!-- Tool Grid -->
<div class="container" style="padding-bottom:26px"><div class="tool-grid" id="toolGrid"><div class="empty-state"><p style="font-size:14px;color:var(--gray-400)">加载工具数据...</p></div></div></div>

<!-- Ad 2 -->
<div class="container" style="padding-bottom:24px"><div class="ad-slot ad-slot-responsive">广告位招租 (响应式)</div></div>
<script>document.write(footerHTML())</script>

<script>
let allTools=[],allCats=[],curCat='',curTab='latest',curSearch='';
let pageSize=24,currentPage=0,filteredList=[];
const AD_SLOTS=[4,12];

async function load(){
  try{
    const [tr,cr]=await Promise.all([fetch('tools.json'),fetch('categories.json')]);
    allTools=await tr.json();allCats=(await cr.json()).categories;init();
  }catch(e){document.getElementById('toolGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>数据加载失败</h3><p>请确认 tools.json 和 categories.json 存在</p></div>'}
}

function init(){
  if(!allTools.length){document.getElementById('toolGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><h3>暂无工具数据</h3><p>请检查 tools.json 文件</p></div>';return}
  const total=allTools.length;const latest=allTools.reduce((a,b)=>new Date(b.createdAt)>new Date(a.createdAt)?b:a);
  const d=latest?new Date(latest.createdAt).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}):'—';
  const ms=new Date(new Date().getFullYear(),new Date().getMonth(),1);const monthNew=allTools.filter(t=>new Date(t.createdAt)>=ms).length;
  document.getElementById('heroStats').innerHTML=`<div class="hero-stat"><div class="hero-stat-num">${monthNew}</div><div class="hero-stat-label">本月新增</div></div><div class="hero-stat"><div class="hero-stat-num">${total.toLocaleString()}</div><div class="hero-stat-label">收录工具</div></div><div class="hero-stat"><div class="hero-stat-num">${allCats.length}</div><div class="hero-stat-label">分类</div></div><div class="hero-stat"><div class="hero-stat-num">${d}</div><div class="hero-stat-label">最近更新</div></div>`;
  renderCats();renderFeat();renderGrid();
}

function renderCats(){
  document.getElementById('catPills').innerHTML=`<span class="cat-pill${!curCat?' active':''}" onclick="clearCat()">📋 全部</span>`+allCats.map(c=>`<span class="cat-pill${curCat===c.id?' active':''}" onclick="filterCat('${c.id}')"><span class="cat-pill-icon">${c.icon}</span>${c.name}</span>`).join('');
}

function filterCat(id){curCat=curCat===id?'':id;renderCats();renderFeat();updateTag();renderGrid()}
function clearCat(){curCat='';renderCats();renderFeat();updateTag();renderGrid()}
function updateTag(){const t=document.getElementById('catTag');if(curCat){t.style.display='inline-flex';const c=allCats.find(x=>x.id===curCat);document.getElementById('catTagName').textContent=(c?c.icon+' '+c.name:'');}else t.style.display='none'}

function renderFeat(){
  let pool=[...allTools];if(curCat)pool=pool.filter(t=>t.category===curCat);
  const d7=new Date();d7.setDate(d7.getDate()-7);
  pool=pool.filter(t=>new Date(t.createdAt)>=d7);
  document.getElementById('featGrid').innerHTML=pool.sort((a,b)=>b.votesCount-a.votesCount).slice(0,8).map((t,i)=>`<div class="feat-card" onclick="window.location.href='tools/${t.slug}-${t.id}.html'" tabindex="0" onkeydown="if(event.key==='Enter')window.location.href='tools/${t.slug}-${t.id}.html'" style="cursor:pointer"><div class="feat-rank">#${i+1}</div><div class="feat-header"><img src="${t.thumbnail}" alt="${t.name}" class="feat-img" loading="lazy" onerror="this.style.display='none'"><div class="feat-info"><div class="feat-name">${t.name}</div><div class="feat-tagline">${t.tagline_zh||t.tagline}</div></div></div><div class="feat-footer"><div class="feat-stats"><span>👍 ${t.votesCount.toLocaleString()}</span><span>💬 ${t.commentsCount}</span></div><a href="${t.website||'#'}" target="_blank" rel="noopener" class="feat-visit" onclick="event.stopPropagation()">访问 →</a></div></div>`).join('');
}

function renderGrid(){
  currentPage=0;
  let list=[...allTools];if(curCat)list=list.filter(t=>t.category===curCat);
  if(curSearch){const q=curSearch.toLowerCase();list=list.filter(t=>t.name.toLowerCase().includes(q)||t.tagline.toLowerCase().includes(q)||t.description.toLowerCase().includes(q))}
  if(curTab==='weekly'){const d7=new Date();d7.setDate(d7.getDate()-7);const d14=new Date();d14.setDate(d14.getDate()-14);list=list.filter(t=>{const d=new Date(t.createdAt);return d>=d14&&d<d7})}
  if(curTab==='monthly'){const ms=new Date(new Date().getFullYear(),new Date().getMonth(),1);list=list.filter(t=>new Date(t.createdAt)>=ms)}
  list.sort((a,b)=>curTab==='latest'?new Date(b.createdAt)-new Date(a.createdAt):b.votesCount-a.votesCount);
  filteredList=list;
  document.getElementById('toolCount').textContent=`共 ${list.length} 个工具`;
  if(!list.length){document.getElementById('toolGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>没有找到相关工具</h3><p>试试其他关键词或分类</p></div>';return}
  appendMore();
  if(curSearch)document.querySelector('.toolbar').scrollIntoView({behavior:'smooth',block:'start'});
}

function appendMore(){
  const start=currentPage*pageSize;
  const batch=filteredList.slice(start,start+pageSize);
  const grid=document.getElementById('toolGrid');
  if(currentPage===0)grid.innerHTML='';
  let html='';
  for(let i=0;i<batch.length;i++){
    const t=batch[i];
    const globalIdx=start+i;
    if(AD_SLOTS.includes(globalIdx)&&!curSearch&&!curCat){
      html+=`<div class="tool-card-ad"><div class="ad-label">广告</div><div style="color:var(--gray-400);font-size:13px">AdSense</div></div>`;
    }
    html+=`<div class="tool-card" onclick="window.location.href='tools/${t.slug}-${t.id}.html'" tabindex="0" onkeydown="if(event.key==='Enter')window.location.href='tools/${t.slug}-${t.id}.html'" style="cursor:pointer"><div class="tool-card-header"><img src="${t.thumbnail}" alt="${t.name}" class="tool-thumb" loading="lazy" onerror="this.style.display='none'"><div class="tool-info"><div class="tool-name">${t.name}</div><div class="tool-tagline">${t.tagline_zh||t.tagline}</div></div></div><div class="tool-topics">${(t.topics||[]).slice(0,3).map(tp=>`<span class="topic-tag">${tp.name}</span>`).join('')}</div><div class="tool-card-footer"><div class="tool-stats"><span>👍 ${t.votesCount.toLocaleString()}</span><span>💬 ${t.commentsCount}</span></div><a href="${t.website||'#'}" target="_blank" rel="noopener" class="btn-visit" onclick="event.stopPropagation()">访问官网 →</a></div></div>`;
  }
  grid.insertAdjacentHTML('beforeend',html);
  currentPage++;
  const btn=document.getElementById('loadMoreBtn');
  if(btn)btn.remove();
  if(currentPage*pageSize<filteredList.length){
    grid.insertAdjacentHTML('afterend',`<button class="load-more" id="loadMoreBtn" onclick="appendMore()">加载更多 (${filteredList.length-currentPage*pageSize} 个剩余)</button>`);
  }
}

document.getElementById('tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');curTab=tab.dataset.tab;renderGrid()});
let st;document.getElementById('searchInput').addEventListener('input',()=>{curSearch=document.getElementById('searchInput').value;clearTimeout(st);st=setTimeout(renderGrid,200)});
load();
</script>
<script src="ad.js"></script>
</body>
</html>
