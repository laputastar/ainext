<style>
:root {
  --section-lg: 96px; --container-max: 1280px;
}
/* ── Search ── */
.header-right{display:flex;align-items:center;gap:12px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--gray-400);pointer-events:none}

/* ── Hero ── */
.hero{padding:48px 0 36px;text-align:center;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(180,83,9,.04) 0%,transparent 70%)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--color-primary);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:44px;font-weight:800;line-height:1.1;letter-spacing:-0.02em;color:var(--gray-900);max-width:700px;margin:0 auto 12px}
.hero h1 span{background:linear-gradient(135deg,var(--color-primary),#D97706,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:17px;color:var(--gray-500);max-width:700px;margin:0 auto 20px;line-height:1.5;white-space:nowrap}
.hero-stats{display:flex;gap:28px;justify-content:center;margin-top:0;padding-top:0;border-top:none}
.hero-stat{text-align:center}.hero-stat-num{font-size:28px;font-weight:800;color:var(--gray-900)}.hero-stat-label{font-size:13px;color:var(--gray-500);margin-top:4px}

/* ── Category Strip (compact pills) ── */
/* removed — categories now in toolbar */

/* ── Featured Section ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-head h2{font-size:18px;font-weight:700;color:var(--gray-900)}
.feat-section{padding:0 0 32px}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.feat-card{background:#fff;border:1.5px solid var(--color-border);border-radius:14px;padding:18px;box-shadow:var(--shadow-xs);transition:all .2s;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.feat-card:hover{border-color:var(--gray-300);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--color-primary),#D97706)}
.feat-rank{font-size:22px;font-weight:800;color:var(--color-accent)}
.feat-header{display:flex;align-items:center;gap:10px}
.feat-img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--gray-100);flex-shrink:0}
.feat-info{flex:1;min-width:0}
.feat-name{font-size:15px;font-weight:600;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feat-tagline{font-size:12px;color:var(--gray-500);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.feat-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.feat-stats{display:flex;gap:10px;font-size:12px;color:var(--gray-400)}
.feat-visit{font-size:12px;font-weight:600;color:var(--color-primary);transition:color .15s}
.feat-visit:hover{color:var(--color-primary-hover)}

/* ── Ad ── */


/* Native ad card — blends into tool grid */
.tool-card-ad{background:linear-gradient(135deg,#FFF7ED,#fff);border:1px dashed #D4A373;border-radius:14px;padding:var(--space-5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;cursor:pointer;transition:all .2s;min-height:180px}
.tool-card-ad:hover{border-color:var(--color-primary);box-shadow:0 2px 12px rgba(180,83,9,.1)}
.ad-label{font-size:11px;font-weight:500;color:var(--gray-400);letter-spacing:.04em;text-transform:uppercase}

/* ── Toolbar ── */
.toolbar{background:var(--gray-50);border-radius:12px;padding:10px 20px;margin-bottom:24px}
.toolbar-inner{display:flex;align-items:center;gap:20px;flex-wrap:nowrap}
.cat-scroll{overflow-x:auto;overflow-y:hidden;overscroll-behavior-x:contain;touch-action:pan-x;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;flex:1;min-width:0}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-row{display:flex;gap:4px;flex-wrap:nowrap}
.cat-link{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--gray-500);text-decoration:none;transition:all .2s;white-space:nowrap;flex-shrink:0}
.cat-link:hover{color:var(--gray-900);background:var(--gray-200)}
.cat-link.active{background:#fff;color:var(--gray-900);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.tabs{display:flex;gap:4px;flex-shrink:0}
.tab{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:var(--gray-500);transition:all .15s;white-space:nowrap;background:none;border:none;cursor:pointer;font-family:inherit}
.tab:hover{color:var(--gray-900);background:var(--gray-200)}
.tab.active{color:var(--gray-900);background:#fff;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.tool-count{font-size:13px;color:var(--gray-400);font-weight:500;white-space:nowrap;flex-shrink:0}
.toolbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
@media(max-width:768px){.toolbar-inner{flex-wrap:wrap;gap:12px}.cat-scroll{width:100%}.toolbar-right{width:100%;justify-content:flex-end}.cat-row{-webkit-overflow-scrolling:touch}}
@media(max-width:640px){.toolbar-inner{flex-direction:column;align-items:stretch}.cat-scroll{width:100%}.toolbar-right{width:100%;justify-content:space-between}.tool-count{text-align:center}}

/* ── Card Grid ── */
.tool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-5)}
/* Card styles → common.css */

/* ── Responsive ── */
@media(max-width:1024px){.tool-grid{grid-template-columns:repeat(3,1fr)}.feat-grid{grid-template-columns:repeat(3,1fr)}.hero h1{font-size:40px}}
@media(max-width:768px){.tool-grid{grid-template-columns:repeat(2,1fr)}.feat-grid{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:34px}.hero p{white-space:normal}.hero{padding:40px 0 32px}.hero-stats{gap:20px}.hero-stat-num{font-size:22px}}
@media(max-width:640px){.tool-grid{grid-template-columns:1fr}.feat-grid{grid-template-columns:1fr}.hero h1{font-size:26px}.hero p{font-size:15px;white-space:normal}.hero{padding:32px 0 24px}.hero-stats{flex-wrap:wrap;gap:16px}.hero-stat-num{font-size:20px}.tab{padding:8px 14px;font-size:13px}.tool-card{padding:16px;gap:10px}}
</style>
<script src="components.js"></script>
<script src="ga.js"></script>

<body>

<script>document.write(headerHTML('','','搜索 AI 工具...'))</script>

<section class="hero">
  <div class="container">
    <h1>发现<span>下一代 AI 工具</span></h1>
    <p>AINext 精选全球最优秀的 AI 产品，帮你找到提升效率、激发创意的人工智能工具。</p>
    <div class="hero-stats" id="heroStats">
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">本周新增</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">收录工具</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">分类</div></div>
      <div class="hero-stat"><div class="hero-stat-num">—</div><div class="hero-stat-label">最近更新</div></div>
    </div>
  </div>
</section>

<!-- Featured -->
<section class="feat-section">
  <div class="container">
    <div class="section-head"><h2>⭐ 本周精选</h2></div>
    <div class="feat-grid" id="featGrid"></div>
  </div>
</section>

<!-- Ad slot 1 -->
<div class="ad-slot ad-slot-index-top"><div class="ad-placeholder">广告位招租 (响应式)</div></div>

<!-- Toolbar: categories + sort -->
<div class="container toolbar">
  <div class="toolbar-inner">
    <div class="cat-scroll"><div class="cat-row" id="catRow"></div></div>
    <div class="toolbar-right">
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="latest">✨ 最新</button>
        <button class="tab" data-tab="weekly">🔥 上周</button>
        <button class="tab" data-tab="monthly">🏆 本月</button>
      </div>
      <span class="tool-count" id="toolCount">共 — 个工具</span>
    </div>
  </div>
</div>

<!-- Tool Grid -->
<div class="container" style="padding-bottom:26px"><div class="tool-grid" id="toolGrid"><div class="empty-state"><p style="font-size:14px;color:var(--gray-400)">加载工具数据...</p></div></div></div>

<!-- Ad slot 2 -->
<div class="ad-slot ad-slot-index-mid"><div class="ad-placeholder">广告位招租 (响应式)</div></div>
<script>document.write(footerHTML())</script>

<script>
let allTools=[],allCats=[],curTab='latest',curSearch='';
let pageSize=24,currentPage=0,filteredList=[],nextAdAt=0;

async function load(){
  try{
    const [tr,cr]=await Promise.all([fetch('tools-slim.json'),fetch('categories.json')]);
    allTools=await tr.json();allCats=(await cr.json()).categories;init();
  }catch(e){document.getElementById('toolGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>数据加载失败</h3><p>请确认 tools.json 和 categories.json 存在</p></div>'}
}

function init(){
  if(!allTools.length){document.getElementById('toolGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">📭</div><h3>暂无工具数据</h3><p>请检查 tools.json 文件</p></div>';return}
  const total=allTools.length;const latest=allTools.reduce((a,b)=>new Date(b.createdAt)>new Date(a.createdAt)?b:a);
  const d=latest?new Date(latest.createdAt).toLocaleDateString('zh-CN',{month:'short',day:'numeric'}):'—';
  const d7=new Date();d7.setDate(d7.getDate()-7);const weekNew=allTools.filter(t=>new Date(t.createdAt)>=d7).length;
  document.getElementById('heroStats').innerHTML=`<div class="hero-stat"><div class="hero-stat-num">${weekNew}</div><div class="hero-stat-label">本周新增</div></div><div class="hero-stat"><div class="hero-stat-num">${total.toLocaleString()}</div><div class="hero-stat-label">收录工具</div></div><div class="hero-stat"><div class="hero-stat-num">${allCats.length}</div><div class="hero-stat-label">分类</div></div><div class="hero-stat"><div class="hero-stat-num">${d}</div><div class="hero-stat-label">最近更新</div></div>`;
  renderCats();renderFeat();renderGrid();
}

function renderCats(){
  document.getElementById('catRow').innerHTML='<a href="index.html" class="cat-link active">全部</a>'+allCats.map(function(c){return '<a href="category/'+c.id+'.html" class="cat-link">'+c.name.replace(/ AI$/,'')+'</a>';}).join('');
}

function renderFeat(){
  let pool=[...allTools];
  const d7=new Date();d7.setDate(d7.getDate()-7);
  pool=pool.filter(t=>new Date(t.createdAt)>=d7);
  document.getElementById('featGrid').innerHTML=pool.sort((a,b)=>b.votesCount-a.votesCount).slice(0,8).map((t,i)=>`<div class="feat-card" onclick="window.location.href='tools/${t.slug}-${t.id}.html'" tabindex="0" onkeydown="if(event.key==='Enter')window.location.href='tools/${t.slug}-${t.id}.html'" style="cursor:pointer"><div class="feat-rank">#${i+1}</div><div class="feat-header"><img src="${t.thumbnail}" alt="${t.name}" class="feat-img" loading="lazy" onerror="this.style.display='none'"><div class="feat-info"><div class="feat-name">${t.name}</div><div class="feat-tagline">${t.tagline_zh||t.tagline}</div></div></div><div class="feat-footer"><div class="feat-stats"><span>👍 ${t.votesCount.toLocaleString()}</span><span>💬 ${t.commentsCount}</span></div><a href="${t.website||'#'}" target="_blank" rel="noopener" class="feat-visit" onclick="event.stopPropagation()">访问 →</a></div></div>`).join('');
}

function renderGrid(){
  currentPage=0;
  nextAdAt=5+Math.floor(Math.random()*5);
  let list=[...allTools];
  if(curSearch){const q=curSearch.toLowerCase();list=list.filter(t=>t.name.toLowerCase().includes(q)||t.tagline.toLowerCase().includes(q)||(t.tagline_zh||'').toLowerCase().includes(q)||(t.topics||[]).some(tp=>tp.name.toLowerCase().includes(q)))}
  if(curTab==='weekly'){const d7=new Date();d7.setDate(d7.getDate()-7);const d14=new Date();d14.setDate(d14.getDate()-14);list=list.filter(t=>{const d=new Date(t.createdAt);return d>=d14&&d<d7})}
  if(curTab==='monthly'){const ms=new Date(new Date().getFullYear(),new Date().getMonth(),1);list=list.filter(t=>new Date(t.createdAt)>=ms)}
  list.sort((a,b)=>curTab==='latest'?new Date(b.createdAt)-new Date(a.createdAt):b.votesCount-a.votesCount);
  filteredList=list;
  document.getElementById('toolCount').textContent=`共 ${list.length} 个工具`;
  if(!list.length){document.getElementById('toolGrid').innerHTML='<div class="empty-state"><div class="empty-state-icon">🔍</div><h3>没有找到相关工具</h3><p>试试其他关键词或分类</p></div>';return}
  // AMC config for shared appendMore
  window.AMC={gridId:'toolGrid',pageSize:24,adInterval:5,adRandom:5};
  window.filteredList=filteredList;
  window.currentPage=currentPage;
  window.nextAdAt=nextAdAt;
  appendMore();
  currentPage=window.currentPage; nextAdAt=window.nextAdAt;
  if(curSearch){const tb=document.querySelector('.toolbar');tb&&tb.scrollIntoView({behavior:'smooth',block:'start'})}
}

document.getElementById('tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');curTab=tab.dataset.tab;renderGrid()});
let st;document.getElementById('searchInput').addEventListener('input',()=>{curSearch=document.getElementById('searchInput').value;clearTimeout(st);st=setTimeout(renderGrid,200)});
load();
</script>
<script src="ad.js"></script>
</body>
