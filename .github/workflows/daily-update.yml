name: Daily Update

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:     # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest data
        run: python fetch_ph_data.py

      - name: Translate new tools
        run: python translate.py tools.json

      - name: Commit & push if changed
        run: |
          git config user.name "AINext Bot"
          git config user.email "bot@ainext.com"
          git add tools.json sitemap.xml
          git diff --staged --quiet || (git commit -m "Daily update: $(date +%Y-%m-%d)" && git push)
