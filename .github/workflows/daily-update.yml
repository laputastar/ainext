name: Daily Update

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force re-translate ALL tools (overwrite existing)'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest data
        run: python fetch_ph_data.py

      - name: Translate new tools (LLM)
        run: python translate_llm.py tools.json ${{ github.event.inputs.force_translate == 'true' && '--force' || '' }}
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          GLM45_API_KEY: ${{ secrets.GLM45_API_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name "AINext Bot"
          git config user.email "bot@ainext.com"
          git add tools.json tools-slim.json sitemap.xml
          git diff --staged --quiet || (git commit -m "Daily update: $(date +%Y-%m-%d)" && git push)
